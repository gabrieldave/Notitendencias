# Coolify → Build Pack: Nixpacks (recomendado si Dockerfile te da problemas de OAuth en build).
# Puerto en el proxy de Coolify: 3015
#
# En Coolify → Environment: marca variables disponibles en BUILD y RUNTIME
# (AUTH_SECRET, AUTH_GOOGLE_*, AUTH_URL, DATABASE_URL, NEXT_PUBLIC_APP_URL, AUTH_TRUST_HOST=true).

[variables]
PORT = "3015"
HOSTNAME = "0.0.0.0"
NODE_OPTIONS = "--max-old-space-size=6144"
NIXPACKS_NODE_VERSION = "22.14"

[phases.build]
cmds = [
  "npm run build",
  "cp -r public .next/standalone/public",
  "cp -r .next/static .next/standalone/.next/static",
]

[start]
cmd = "sh scripts/start-standalone.sh"
