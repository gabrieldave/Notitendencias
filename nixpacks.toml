# Coolify: preferir Build Pack → Dockerfile. Si usas Nixpacks, puerto 3015 en el proxy.
[variables]
PORT = "3015"
HOSTNAME = "0.0.0.0"
NODE_OPTIONS = "--max-old-space-size=4096"
NIXPACKS_NODE_VERSION = "22.14"

[phases.build]
cmds = [
  "npm run build",
  "cp -r public .next/standalone/public",
  "cp -r .next/static .next/standalone/.next/static",
]

[start]
cmd = "sh scripts/start-standalone.sh"
